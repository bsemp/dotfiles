---
name: Test

on:
  pull_request:
    paths:
      - playbooks/**
      - roles/**
      - ".github/workflows/*"

concurrency:
  group: test-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: 3.13

jobs:
  lint:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # ratchet:actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # ratchet:astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Create virtual environment
        run: |
          uv venv .venv --prompt "dotfiles_venv"

      - name: Install dependencies
        run: |
          # uv will install dependencies from restored cache if any
          uv sync --frozen

      - name: Run lint
        run: uv run ansible-lint

  deploy:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@f1cc9df7a62b7f6244414d21a3ebc3ba9156a082 # ratchet:Homebrew/actions/setup-homebrew@master
        with:
          core: true
          cask: true

      - name: Set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # ratchet:actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # ratchet:astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Create virtual environment
        run: |
          uv venv .venv --prompt "dotfiles_venv"

      - name: Install dependencies
        run: |
          # uv will install dependencies from restored cache if any
          uv sync --frozen

      - name: Cleanup Runner before install
        run: |
          rm -rf ${HOME}/.azure

      - name: Install playbook
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          uv run ansible-playbook playbooks/main.yml -vv
